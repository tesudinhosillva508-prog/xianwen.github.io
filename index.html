<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笃行 | 计算机网络技术团队</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: #0b0f19;
            color: #fff;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(135deg, #0b0f19 0%, #131825 100%);
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(64, 158, 255, 0.1);
            z-index: 999;
            padding: 16px 0;
            transition: all 0.3s ease;
        }

        nav.scroll {
            background: rgba(11, 15, 25, 0.95);
            padding: 12px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: bold;
            color: #409eff;
            letter-spacing: 6px;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: #c9d5e8;
            text-decoration: none;
            margin-left: 28px;
            font-size: 15px;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            color: #409eff;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #409eff;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            font-size: 22px;
            color: #409eff;
            background: none;
            border: none;
            cursor: pointer;
        }

        section {
            scroll-margin-top: 80px;
        }

        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            z-index: 2;
            background: transparent;
        }

        .title {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 36px;
            padding-left: 18px;
            background: linear-gradient(90deg, #fff, #409eff, #81b0ff, #409eff, #fff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: flowLight 4s linear infinite, fadeIn 1.2s ease forwards 0.4s;
            text-shadow: 0 0 30px rgba(64, 158, 255, 0.5);
            opacity: 0;
        }

        @keyframes flowLight {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .subtitle {
            font-size: 18px;
            color: #a0b4d8;
            margin-top: 16px;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
            min-height: 24px;
        }

        .hero-btn {
            margin-top: 40px;
            padding: 14px 40px;
            background: linear-gradient(135deg, #409eff, #2b7dff);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(64, 158, 255, 0.3);
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 1.2s;
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(64, 158, 255, 0.45);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(20px); }
        }

        .container {
            max-width: 1100px;
            margin: 40px auto 60px;
            padding: 0 24px;
            position: relative;
            z-index: 3;
        }

        .card {
            background: rgba(25, 32, 50, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(64, 158, 255, 0.12);
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.6s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(64, 158, 255, 0.15);
            border-color: rgba(64, 158, 255, 0.3);
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .card h2 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #409eff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card p {
            color: #c9d5e8;
            font-size: 16px;
            line-height: 1.9;
            margin-bottom: 12px;
        }

        .tag {
            display: inline-block;
            padding: 7px 15px;
            background: rgba(64, 158, 255, 0.1);
            color: #81b0ff;
            border-radius: 50px;
            margin: 6px 6px 0 0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .tag:hover {
            background: rgba(64, 158, 255, 0.2);
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 50px 20px;
            color: #667aa1;
            font-size: 14px;
            border-top: 1px solid rgba(64, 158, 255, 0.08);
            margin-top: 40px;
            position: relative;
            z-index: 3;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 46px;
            height: 46px;
            background: rgba(64, 158, 255, 0.9);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 998;
            box-shadow: 0 4px 15px rgba(64, 158, 255, 0.3);
        }

        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 60px;
                right: 0;
                width: 220px;
                background: rgba(11, 15, 25, 0.95);
                backdrop-filter: blur(15px);
                flex-direction: column;
                padding: 20px;
                gap: 16px;
                transform: translateX(100%);
                transition: transform 0.3s ease;
                border-left: 1px solid rgba(64, 158, 255, 0.2);
            }

            .nav-links.active {
                transform: translateX(0);
            }

            .nav-links a {
                margin-left: 0;
                padding: 8px 0;
            }

            .menu-toggle {
                display: block;
            }

            .title {
                font-size: 42px;
                letter-spacing: 18px;
                padding-left: 9px;
            }

            .card {
                padding: 28px;
            }
        }
    </style>
</head>

<body>
    <canvas id="particles"></canvas>

    <nav>
        <div class="nav-container">
            <div class="nav-logo">笃 行</div>
            <div class="nav-links">
                <a href="#home">首页</a>
                <a href="#about">团队</a>
                <a href="#idea">理念</a>
                <a href="#tech">技术</a>
            </div>
            <button class="menu-toggle">☰</button>
        </div>
    </nav>

    <section id="home" class="hero">
        <h1 class="title">笃 行</h1>
        <p class="subtitle" id="typed"></p>
        <button class="hero-btn" onclick="document.querySelector('#about').scrollIntoView()">了解团队</button>
    </section>

    <div class="container">
        <section id="about" class="card">
            <h2>📌 团队介绍</h2>
            <p>笃行团队由计算机网络专业同学共同组建，专注网络技术、系统运维、网络安全与实战项目研究。</p>
            <p>我们以行动践行初心，以技术成就梦想，踏实、专注、协作、共进。</p>
        </section>

        <section id="idea" class="card">
            <h2>🎯 团队理念</h2>
            <p>笃行致远，网联未来</p>
            <p>严谨、专注、协作、突破</p>
        </section>

        <section id="tech" class="card">
            <h2>💻 技术方向</h2>
            <div class="tag">网络配置与运维</div>
            <div class="tag">服务器搭建</div>
            <div class="tag">网络安全</div>
            <div class="tag">系统调试</div>
            <div class="tag">实战项目</div>
            <div class="tag">技能竞赛</div>
        </section>

        <section class="card">
            <h2>⚡ 团队精神</h2>
            <p>不驰于空想，不骛于虚声。</p>
            <p>一步一个脚印，把技术做深，把事情做实。</p>
        </section>
    </div>

    <footer>
        笃行团队 © 2026 | Steadfastly Practice
    </footer>

    <div class="back-to-top" onclick="window.scrollTo(0,0)">↑</div>

    <script>
        const nav = document.querySelector('nav');
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        const backToTop = document.querySelector('.back-to-top');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('scroll');
            } else {
                nav.classList.remove('scroll');
            }

            if (window.scrollY > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        const particlesArray = [];
        const particleCount = Math.floor(w * 0.12);

        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 1.2 + 0.4;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.color = 'rgba(64, 158, 255, 0.35)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > w) this.x = Math.random() * w;
                if (this.y < 0 || this.y > h) this.y = Math.random() * h;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray.length = 0;
            for (let i = 0; i < particleCount; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    const dx = particlesArray[a].x - particlesArray[b].x;
                    const dy = particlesArray[a].y - particlesArray[b].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 90) {
                        ctx.strokeStyle = `rgba(64, 158, 255, ${0.12 - dist/1200})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            connect();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            init();
        });

        init();
        animate();

        const cards = document.querySelectorAll('.card');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('show');
            });
        }, { threshold: 0.1 });
        cards.forEach(card => observer.observe(card));

        function typeWriter() {
            const el = document.getElementById('typed');
            const text = "Steadfastly Practice · 计算机网络技术团队";
            let idx = 0;

            function type() {
                if (idx < text.length) {
                    el.innerHTML += text.charAt(idx);
                    idx++;
                    setTimeout(type, 60);
                }
            }
            setTimeout(type, 800);
        }
        typeWriter();
    </script>
</body>
</html>
